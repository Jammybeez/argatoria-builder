services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: argatoria
      POSTGRES_PASSWORD: argatoria
      POSTGRES_DB: argatoria
    ports:
      # Host port 5433, not 5432 — something else on this machine (a
      # non-Docker Postgres, PID visible via `Get-Process -Id 7800` at time
      # of writing) is already bound to 5432, so requests to 5432 hit that
      # instead of this container.
      - "5433:5432"
    volumes:
      - argatoria-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argatoria"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Container-to-container DNS: "db" resolves to the postgres service
      # above, on its internal port 5432 (not the 5433 host mapping, which
      # only matters for connections from outside the compose network).
      DATABASE_URL: postgresql://argatoria:argatoria@db:5432/argatoria
      NODE_ENV: production
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_GOOGLE_CLIENT_ID: ${BETTER_AUTH_GOOGLE_CLIENT_ID}
      BETTER_AUTH_GOOGLE_CLIENT_SECRET: ${BETTER_AUTH_GOOGLE_CLIENT_SECRET}
      BETTER_AUTH_DISCORD_CLIENT_ID: ${BETTER_AUTH_DISCORD_CLIENT_ID}
      BETTER_AUTH_DISCORD_CLIENT_SECRET: ${BETTER_AUTH_DISCORD_CLIENT_SECRET}
    ports:
      - "3000:3000"

volumes:
  argatoria-db-data:
